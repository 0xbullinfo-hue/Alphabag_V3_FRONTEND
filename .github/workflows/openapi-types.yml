name: Frontend OpenAPI Types

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  verify-openapi-types:
    runs-on: ubuntu-latest
    env:
      OPENAPI_SPEC_URL: https://raw.githubusercontent.com/0xbullinfo-hue/alphabag_v3_backend/main/openapi.yaml
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify generated OpenAPI types are up to date
        run: npm run verify:openapi-types

      - name: Build
        run: npm run build
